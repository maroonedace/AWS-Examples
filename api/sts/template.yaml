AWSTemplateFormatVersion: 2010-09-09
Description: Create a role for the encryption client
Parameters:
  BucketName:
    Type: String
    Default: sts-encryption-client-ao-23234
  MachineUserArn:
    Type: String
    Default: arn:aws:iam::779846778159:user/sts-machine-user
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
  StsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref MachineUserArn
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: s3access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "*"
                Resource:
                  [
                    !Sub "arn:aws:s3:::*",
                    !Sub "arn:aws:s3:::${BucketName}",
                    !Sub "arn:aws:s3:::${BucketName}/*",
                  ]
