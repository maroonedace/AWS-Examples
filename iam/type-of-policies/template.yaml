AWSTemplateFormatVersion: '2010-09-09'
Description: Create a user with a view only policy
Parameters:
  UserName:
    Type: String
    Default: view-only-user
Resources:
  MyUser: 
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref UserName
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess
      Policies:
        - PolicyName: MyCoolPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Sid: "IamListAccess"
                Effect: Allow
                Action: 
                - "iam:ListUsers"
                - "iam:ListRoles"
                Resource: "*"

  MyInlinePolicy:
    Type: AWS::IAM::Policy
    Properties: 
      PolicyName: MyInlinePolicy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: "ec2:*"
            Resource: "*"
      Users:
        - !Ref MyUser
  MySecondInlinePolicy:
    Type: AWS::IAM::UserPolicy
    Properties: 
      PolicyName: MySecondInlinePolicy
      UserName: !Ref MyUser
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: "s3:*"
            Resource: "*"